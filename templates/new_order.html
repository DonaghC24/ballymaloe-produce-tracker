{% extends "base.html" %}
{% block title %}Place Order{% endblock %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow-sm border-0">
        <div class="card-body py-4">

          <h3 class="fw-semibold mb-4">Place Daily Order</h3>

          <form method="POST" action="{{ url_for('new_order') }}">

            <div class="mb-3">
              <label class="form-label">Category</label>
              <select class="form-select" id="category" onchange="filterProduce()" required>
                <option value="">Select category</option>
                <option value="Fruit">Fruit</option>
                <option value="Vegetable">Vegetable</option>
                <option value="Herb">Herb</option>
                <option value="Other">Other</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Produce</label>
              <select class="form-select" id="produce_name" name="produce_name" required>
                <option value="">Select produce</option>
                {% for produce in produce_types %}
                  <option value="{{ produce.name }}" data-category="{{ produce.category }}">
                    {{ produce.name }}
                  </option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Quantity</label>
              <input type="text" class="form-control" name="quantity" required>
            </div>

            <div class="mb-3">
              <label class="form-label">Unit</label>
              <select class="form-select" name="unit" required>
                <option value="">Select unit</option>
                <option value="bunch">Bunch</option>
                <option value="chip">Chip</option>
                <option value="tray">Tray</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Date (defaults to today)</label>
              <input type="date" class="form-control" name="ordered_on">
            </div>

            <div class="mb-3">
              <label class="form-label">Notes (optional)</label>
              <textarea class="form-control" name="notes" rows="2"></textarea>
            </div>

            <button type="submit" class="btn btn-primary px-4">Place Order</button>

          </form>

        </div>
      </div>

    <!-- ITERATION 4: COMBINED SEARCH + CATEGORY FILTERING
     Updated from iteration 2 category-only filtering
     Reference: https://stackoverflow.com/questions/73696892/javascript-using-onchange-to-filter-data-using-a-drop-down-menu -->
            <script>
        function filterProduce() {
            const category = document.getElementById("category").value;
            const produceSelect = document.getElementById("produce_name");

            for (let i = 0; i < produceSelect.options.length; i++) {
                const option = produceSelect.options[i];
                const optionCategory = option.getAttribute("data-category");

                if (!category || option.value === "") {
                    option.style.display = "block";
                } else {
                    option.style.display = optionCategory === category ? "block" : "none";
                }
            }

            produceSelect.selectedIndex = 0; // reset dropdown
        }
</script>


    </div>
  </div>
</div>
{% endblock %}
